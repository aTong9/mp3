<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whisper - 沉浸式 ASMR 声音空间</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- 背景氛围 -->
  <div class="bg-ambient"></div>

  <!-- 顶部导航 -->
  <header class="header">
    <div class="header-left">
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 12h2"/><path d="M6 8v8"/><path d="M10 5v14"/><path d="M14 9v6"/><path d="M18 7v10"/><path d="M20 12h2"/>
        </svg>
        <span>Whisper</span>
      </div>
    </div>
    <nav class="header-nav">
      <button class="nav-btn active" data-tab="sleep">🌙 助眠放松</button>
      <button class="nav-btn" data-tab="focus">✍️ 专注写作</button>
      <button class="nav-btn" data-tab="nature">🌿 自然之声</button>
      <button class="nav-btn" data-tab="meditation">🧘 冥想静心</button>
      <button class="nav-btn" data-tab="custom">📁 我的素材</button>
    </nav>
    <div class="header-right">
      <button class="timer-btn" id="timerBtn" title="定时关闭">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
        <span id="timerDisplay">定时</span>
      </button>
      <button class="master-stop-btn" id="masterStopBtn" title="停止全部">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12"/></svg>
      </button>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="main-content">
    <!-- 声音卡片网格 -->
    <section class="sound-grid" id="soundGrid">
      <!-- 动态填充 -->
    </section>

    <!-- 空状态 -->
    <div class="empty-state" id="emptyState" style="display:none;">
      <div class="empty-icon">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
      </div>
      <h3>还没有自定义素材</h3>
      <p>点击下方按钮上传你的音频文件，或拖拽文件到此处</p>
      <label class="upload-btn-large">
        <input type="file" id="customFileInput" accept="audio/*" multiple hidden>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        上传音频文件
      </label>
      <p class="hint-text">支持 MP3、WAV、OGG、FLAC 格式</p>
    </div>

    <!-- 自定义素材上传按钮（已有素材时显示） -->
    <div class="custom-upload-bar" id="customUploadBar" style="display:none;">
      <label class="upload-btn-small">
        <input type="file" id="customFileInput2" accept="audio/*" multiple hidden>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        添加更多素材
      </label>
    </div>
  </main>

  <!-- 底部混音台 -->
  <aside class="mixer-panel" id="mixerPanel">
    <div class="mixer-header">
      <h3>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>
        混音台
      </h3>
      <span class="mixer-count" id="activeCount">0 个声音</span>
    </div>
    <div class="mixer-channels" id="mixerChannels">
      <div class="mixer-empty" id="mixerEmpty">
        <p>选择一个声音开始混音...</p>
      </div>
    </div>
    <div class="mixer-footer">
      <div class="master-volume">
        <label>主音量</label>
        <input type="range" id="masterVolume" min="0" max="100" value="80" step="1">
        <span id="masterVolumeVal">80%</span>
      </div>
    </div>
  </aside>

  <!-- 定时器弹窗 -->
  <div class="modal-overlay" id="timerModal">
    <div class="modal">
      <div class="modal-header">
        <h3>定时关闭</h3>
        <button class="modal-close" id="timerModalClose">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="timer-presets">
          <button class="timer-preset" data-minutes="15">15 分钟</button>
          <button class="timer-preset" data-minutes="30">30 分钟</button>
          <button class="timer-preset" data-minutes="45">45 分钟</button>
          <button class="timer-preset" data-minutes="60">1 小时</button>
          <button class="timer-preset" data-minutes="90">1.5 小时</button>
          <button class="timer-preset" data-minutes="120">2 小时</button>
          <button class="timer-preset" data-minutes="0">关闭定时</button>
        </div>
        <div class="timer-custom">
          <label>自定义时间（分钟）</label>
          <div class="timer-custom-input">
            <input type="number" id="customTimerMinutes" min="1" max="480" placeholder="输入分钟数" value="25">
            <button id="setCustomTimer">设置</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 通知 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/audio-engine.js"></script>
  <script src="js/presets.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
